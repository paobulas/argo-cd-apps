apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onetimesecret-prod
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  source:
    path: onetimesecret/helm/app
    repoURL: 'https://github.com/paobulas/argo-cd-apps'
    targetRevision: main
    helm:
      valueFiles:
      - values.yaml
      - values-prod.yaml
  destination:
    namespace: onetimesecret
    server: 'https://kubernetes.default.svc'
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m0s
        factor: 2
    syncOptions:
      - CreateNamespace=true
