apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onetimesecret-db
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    path: onetimesecret/apps-of-apps/db
    repoURL: https://github.com/paobulas/argo-cd-apps
    targetRevision: main
  destination:
    namespace: onetimesecret
    name: in-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
