apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: redis
    tier: database
  name: redis
  namespace: onetimesecret
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    matchLabels:
      app: redis
      tier: database
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: redis
        tier: database
    spec:
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
      - image: redis:latest
        name: redis
        args:
          - "--save"
          - "''"
        resources:
          requests:
            cpu: "15m"
            memory: "10Mi"
          limits:
            memory: "15Mi"
            cpu: "20m"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsGroup: 999
          runAsNonRoot: true
          runAsUser: 999
        volumeMounts:
        - mountPath: /data
          name: redis-db
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 30
          timeoutSeconds: 5
          periodSeconds: 5
          failureThreshold: 5
          successThreshold: 1
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 20
          timeoutSeconds: 5
          periodSeconds: 3
      volumes:
      - name: redis-db
        persistentVolumeClaim:
          claimName: onetimesecret-db-pvc
